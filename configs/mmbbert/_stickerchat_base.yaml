name: stickerchat_mmbbert_base
description: "Legacy MM-BERT on StickerChat remapped int-id assets."

mode: train
gpus: 1
seed: 2021
local_files_only: true

bert_pretrain_path: ./ckpt/bert-base-chinese
img_pretrain_path: ./ckpt/clip-ViT-B-32
text_clip_pretrain_path: ./ckpt/clip-ViT-B-32

train_data_path: ./stickerchat/processed/release_train_u_sticker_format_int.json
val_data_path: ""
per_epoch_eval_test_r10_path: ./stickerchat/processed/release_test_u_sticker_format_int_with_cand_r10.json
per_epoch_eval_test_r20_path: ./stickerchat/processed/release_test_u_sticker_format_int_with_cand_r20.json
test_data_path: ./stickerchat/processed/release_test_u_sticker_format_int_with_cand_r10.json

id2img_path: ./stickerchat/processed/id2img.json
id2name_path: ./stickerchat/processed/id2name.json
ocr_path: ./stickerchat/processed/ocr.json
img_dir: ./stickerchat/png_stickers_flat

model_choice: use_img_clip
fix_img: true
fix_text: false

max_image_id: 174695
speaker_token_max_id: 32
sent_num: 0
test_with_cand: true
candidate_eval_only: true

train_batch_size: 16
valtest_batch_size: 1
num_workers: 8
epochs: 10
gradient_accumulation_steps: 1

prepare_batch_size: 256
prepare_workers: 8
img_emb_cache_path: ./stickerchat/processed/stickerchat_clip_embs.pt

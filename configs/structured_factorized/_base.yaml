# Shared defaults for Structured Factorized.
# Runtime behavior is the minimal core in structured_retrieval_factorized.py:
# additive scores on full candidates; union/fusion-related keys below are legacy YAML only.

name: structured_factorized_base
description: "Shared MM-BERT + style/expression factorized retrieval recipe."

mode: train
gpus: 1
seed: 2021

fix_img: true
fix_text: false
model_choice: use_img_clip
local_files_only: true

bert_pretrain_path: ./ckpt/bert-base-chinese
img_pretrain_path: ./ckpt/clip-ViT-B-32
text_clip_pretrain_path: ./ckpt/clip-ViT-B-32

train_data_path: ./data/train_pair.json
val_data_path: ./data/validation_pair.json
test_data_path: ./data/validation_pair.json
max_image_id: 307

img_emb_cache_path: ./data/meme_set_clip_embs.pt

style_neighbors_path: ./style_neighbors.json
factorized_pseudo_label_path: ./pseudo_labels/sticker_identity_style_labels_from_data_meme_set_model_gemini-3-pro-preview_date_20260321.jsonl
factorized_bank_path: ./factorized_style_bank.json

style_neighbor_topk: 5
style_sampling_mode: random_topk
expr_gate_mode: sigmoid
struct_fuse_mode: full
lambda_struct: 0.5
lambda_expr: 0.3
lambda_style_proto: 0.4

# Factorized step uses query BERT + up to 3× MM-BERT per sample (or 2× if factorized_train_mmbert_two_way).
train_batch_size: 16
valtest_batch_size: 1
num_workers: 8
# Tokenizer max_length for dialogue (main.py collate); lower → faster attention, may hurt quality.
max_dialogue_length: 490
# factorized_profile_train_steps: 0
# factorized_train_mmbert_two_way: false
# factorized_train_two_way_neg: same
epochs: 10
# Match structured_residual/_base and typical working CLI: accum>1 can hit DDP+BERT-checkpoint
# edge cases (first optimizer step after N micro-batches) on older transformers/torch stacks.
gradient_accumulation_steps: 1
# Explicit false: avoid default find_unused_parameters=True traversal with deep factorized graph
# (query BERT + up to 3× MM-BERT + fusion); pairs better with config-only gradient checkpointing.
ddp_find_unused_parameters: false

factorized_style_recall_topk: 32
factorized_style_proto_topk: 4
factorized_proto_expand_per_proto: 12
factorized_mmbert_branch_topk: 16
factorized_candidate_union_topk: 64
factorized_use_mmbert_branch: true
factorized_eval_compare_mmbert: true
factorized_fusion_hidden_dim: 32
factorized_proto_logit_scale: 10.0
factorized_proto_consistency_weight: 0.0
factorized_log_interval: 200

train_same_proto_negatives: 1
train_cross_proto_negatives: 1

# Optional two-stage training schedule for the final paper model:
# stage1 emphasizes decomposition/prototype organization; stage2 emphasizes ranking.
factorized_stage1_ratio: 0.0
factorized_stage1_struct_scale: 1.0
factorized_stage1_expr_scale: 1.0
factorized_stage1_style_proto_scale: 1.0
factorized_stage2_struct_scale: 1.0
factorized_stage2_expr_scale: 1.0
factorized_stage2_style_proto_scale: 1.0

train_prog_bar_mode: compact

# BERT gradient checkpointing stays on (factorized does 3× MM-BERT / step; VRAM heavy without it).
# Default ddp_static_graph_callback=false: do not pair DdpStaticGraphCallback with transformers 4.10
# config-only checkpointing (avoids rare run_backward NULL on multi-GPU). Upgrade transformers or set
# ddp_static_graph_callback: true if you need the callback for your stack.

extends: stickerchat_base.yaml
name: stickerchat_v7_full_model
description: >
  StickerChat performance-oriented factorized model: two-stage candidate union plus learned fusion reranker,
  staged auxiliary training, and prototype-aware reasoning on top of MM-BERT.
pl_root_dir: logs/stickerchat_factorized_v7_full_model

factorized_variant: full
base_only: false
factorized_use_mmbert_branch: true

lambda_struct: 0.55
lambda_expr: 0.35
lambda_style_proto: 0.6

factorized_style_recall_topk: 40
factorized_style_proto_topk: 6
factorized_proto_expand_per_proto: 16
factorized_mmbert_branch_topk: 20
factorized_candidate_union_topk: 72
factorized_fusion_hidden_dim: 48
factorized_proto_logit_scale: 12.0
factorized_proto_consistency_weight: 0.35

train_same_proto_negatives: 3
train_cross_proto_negatives: 3

factorized_stage1_ratio: 0.35
factorized_stage1_struct_scale: 1.25
factorized_stage1_expr_scale: 0.75
factorized_stage1_style_proto_scale: 1.5
factorized_stage2_struct_scale: 1.0
factorized_stage2_expr_scale: 1.15
factorized_stage2_style_proto_scale: 1.0

extends: _base.yaml
name: v6_00_minimal_core
description: >
  Paper minimal core: MMBERT + sticker decomposition + prototype style prior.
  Additive final score on the full candidate set (no union recall, no fusion MLP, no query gate, no proto-density weighting).
pl_root_dir: logs/structured_factorized_v6_00_minimal_core

factorized_variant: minimal
base_only: false

# Scoring: s_final = s_mmbert + lambda_expr * s_expr + lambda_style_proto * proto_logit[proto_id]
lambda_expr: 0.3
lambda_style_proto: 0.4
lambda_orth: 0.5

# style_neighbor_loss removed in minimal core; lambda_struct unused for factorized total loss.
# Union / fusion CLI fields in _base are ignored at runtime (kept for YAML compatibility).
